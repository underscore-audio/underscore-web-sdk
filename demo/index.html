<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Underscore SDK Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      background: #0a0a0a;
      color: #e0e0e0;
      line-height: 1.6;
    }

    h1 {
      color: #fff;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #888;
      margin-bottom: 2rem;
    }

    .section {
      background: #151515;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .section h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 1rem 0;
    }

    .input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    input[type="text"], input[type="password"] {
      flex: 1;
      padding: 0.75rem 1rem;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: #4a9eff;
    }

    button {
      padding: 0.75rem 1.5rem;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    button:hover:not(:disabled) {
      background: #333;
      border-color: #555;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.primary {
      background: #4a9eff;
      border-color: #4a9eff;
    }

    button.primary:hover:not(:disabled) {
      background: #3a8eef;
    }

    button.danger {
      background: #dc3545;
      border-color: #dc3545;
    }

    button.danger:hover:not(:disabled) {
      background: #c82333;
    }

    .synth-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .synth-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
    }

    .synth-item.selected {
      border-color: #4a9eff;
    }

    .synth-name {
      font-weight: 600;
      color: #fff;
    }

    .synth-desc {
      color: #888;
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .player-controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .params-grid {
      display: grid;
      gap: 1rem;
    }

    .param-row {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .param-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .param-name {
      font-weight: 500;
    }

    .param-value {
      color: #4a9eff;
      font-family: monospace;
    }

    .param-desc {
      font-size: 0.85rem;
      color: #666;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: #333;
      border-radius: 3px;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #4a9eff;
      border-radius: 50%;
      cursor: pointer;
    }

    .log {
      font-family: monospace;
      font-size: 0.85rem;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 1rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .log-entry {
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #1a1a1a;
    }

    .log-entry:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .log-time {
      color: #666;
    }

    .log-message {
      color: #ccc;
    }

    .log-error {
      color: #dc3545;
    }

    .log-success {
      color: #28a745;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: #1a1a1a;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }

    .status-dot.connected {
      background: #28a745;
    }

    .status-dot.playing {
      background: #4a9eff;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #666;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .generate-section textarea {
      width: 100%;
      padding: 1rem;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      resize: vertical;
      min-height: 80px;
      margin-bottom: 1rem;
    }

    .generate-section textarea:focus {
      outline: none;
      border-color: #4a9eff;
    }

    .generation-output {
      padding: 1rem;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>Underscore SDK Demo</h1>
  <p class="subtitle">Interactive demo of the @underscore/sdk capabilities</p>

  <!-- Configuration -->
  <div class="section" data-testid="config-section">
    <h2>Configuration</h2>
    <div class="input-group">
      <label for="apiKey" class="visually-hidden">API Key</label>
      <input type="password" id="apiKey" placeholder="API Key (us_...)" data-testid="api-key-input" />
    </div>
    <div class="input-group">
      <label for="compositionId" class="visually-hidden">Composition ID</label>
      <input type="text" id="compositionId" placeholder="Composition ID (e.g., cmp_abc123)" data-testid="composition-id-input" />
      <button id="initBtn" class="primary" data-testid="init-button">Initialize</button>
    </div>
    <div class="status" id="status" data-testid="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Not initialized</span>
    </div>
  </div>

  <!-- Synth List -->
  <div class="section" id="synthsSection" style="display: none;">
    <h2>Synths</h2>
    <div id="synthList" class="synth-list">
      <div class="empty-state">Loading synths...</div>
    </div>
  </div>

  <!-- Player -->
  <div class="section" id="playerSection" style="display: none;" data-testid="player-section">
    <h2>Player</h2>
    <div class="player-controls">
      <button id="playBtn" class="primary" disabled data-testid="play-button">Play</button>
      <button id="stopBtn" disabled data-testid="stop-button">Stop</button>
      <button id="resetBtn" disabled data-testid="reset-button">Reset Params</button>
    </div>
    <div id="paramsGrid" class="params-grid" data-testid="params-grid"></div>
  </div>

  <!-- Generation -->
  <div class="section generate-section" id="generateSection" style="display: none;">
    <h2>Generate New Synth</h2>
    <textarea id="generatePrompt" placeholder="Describe the sound you want to create...
Example: A warm analog pad with slow filter sweep and subtle detuning"></textarea>
    <button id="generateBtn" class="primary">Generate</button>
    <div id="generationOutput" class="generation-output" style="display: none;"></div>
  </div>

  <!-- Log -->
  <div class="section">
    <h2>Log</h2>
    <div id="log" class="log">
      <div class="empty-state">Events will appear here...</div>
    </div>
  </div>

  <script type="module" src="/main.ts"></script>
</body>
</html>
