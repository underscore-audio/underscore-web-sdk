name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # The previous `e2e` job here invoked a `test:e2e` script that never
  # existed and never passed on main. Real end-to-end coverage for the
  # SDK lives in the main underscore repo
  # (web/tests/e2e/wizard-install.spec.ts), where we can spin up the full
  # API stack with LocalStack/Redis. If we ever want a self-contained
  # live-API fixture here worth running on every push, we can re-add a
  # proper job -- until then, a perpetually-red check only hides real
  # failures and forces `--admin` merges.

  wizard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/wizard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/wizard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  publish-wizard:
    runs-on: ubuntu-latest
    needs: [wizard]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # id-token: write is required for npm Trusted Publishing via OIDC.
    # contents: read is the default; we declare it explicitly because setting
    # any permission resets all others to none unless listed.
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: packages/wizard
    steps:
      - uses: actions/checkout@v4

      # npm Trusted Publishing requires npm >= 11.5.1. We pin Node 24 (current
      # LTS "Krypton") because it bundles npm >= 11.6.1 out of the box. The
      # previous approach (Node 22 + `npm install -g npm@latest`) is
      # flaky on GitHub hosted runners: the self-upgrade leaves arborist's
      # dependency tree broken (missing `promise-retry`) and the next npm
      # command crashes with MODULE_NOT_FOUND. Staying on a Node version
      # that ships a compatible npm sidesteps the self-upgrade entirely.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: packages/wizard/package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if version changed
        id: check
        run: |
          PUBLISHED_VERSION=$(npm view @underscore-audio/wizard version 2>/dev/null || echo "0.0.0")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$PUBLISHED_VERSION" != "$CURRENT_VERSION" ]; then
            echo "publish=true" >> $GITHUB_OUTPUT
          fi

      # --provenance is intentionally omitted: npm's sigstore attestation
      # requires the source repository to be public, and this repo is still
      # private. Trusted Publishing (OIDC auth, no NPM_TOKEN) still works
      # without it. Re-add --provenance once the repo is made public.
      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: npm publish --access public

  publish:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # See publish-wizard for why we pin Node 24 instead of upgrading npm.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if version changed
        id: check
        run: |
          PUBLISHED_VERSION=$(npm view @underscore-audio/sdk version 2>/dev/null || echo "0.0.0")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$PUBLISHED_VERSION" != "$CURRENT_VERSION" ]; then
            echo "publish=true" >> $GITHUB_OUTPUT
          fi

      # --provenance is intentionally omitted: npm's sigstore attestation
      # requires the source repository to be public, and this repo is still
      # private. Trusted Publishing (OIDC auth, no NPM_TOKEN) still works
      # without it. Re-add --provenance once the repo is made public.
      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: npm publish --access public
